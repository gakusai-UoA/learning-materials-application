appId: com.gdgoc.webstudyapp
productName: 勉強会資料
directories:
    buildResources: build
    output: dist
publish:
    provider: github
    owner: gakusai-UoA
    repo: learning-materials-application
files:
    - 'out/main/**/*'
    - 'out/renderer/**/*'
    - 'out/preload/**/*'
    - 'package.json'
    - '!**/.vscode/*'
    - '!src/*'
    - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
    - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
    - resources/**
extraResources:
    - from: assets/
      to: assets/
      filter:
          - '**/*.pdf'
mac:
    target:
        - target: dmg
          arch:
              - x64
              - arm64
    category: public.app-category.education
dmg:
    artifactName: learning-material-${version}-${arch}.${ext}
win:
    target:
        - target: nsis
          arch:
              - x64
              - ia32
    executableName: learning-app
nsis:
    artifactName: learning-material-Setup-${version}.${ext}
    shortcutName: ${productName}
    uninstallDisplayName: ${productName}
    oneClick: true
    perMachine: true
    createDesktopShortcut: false
    createStartMenuShortcut: true
linux:
    target:
        - AppImage
    category: Education
npmRebuild: false
